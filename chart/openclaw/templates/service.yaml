apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
    kagenti.io/type: agent
    kagenti.io/protocol: a2a
  annotations:
    kagenti.io/description: "OpenClaw AI Agent Gateway"
    {{- if eq .Values.mode "openshift" }}
    service.beta.openshift.io/serving-cert-secret-name: openclaw-proxy-tls
    {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
  ports:
    - name: a2a
      port: 8080
      targetPort: a2a
      protocol: TCP
    {{- if eq .Values.mode "openshift" }}
    - name: oauth-ui
      port: 8443
      targetPort: oauth-ui
      protocol: TCP
    {{- end }}
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP
    - name: bridge
      port: 18790
      targetPort: 18790
      protocol: TCP
