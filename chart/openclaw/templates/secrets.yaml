apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENCLAW_GATEWAY_TOKEN: {{ include "openclaw.gatewayToken" . | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.vertex.project | default "" | quote }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.vertex.location | default "" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  MLFLOW_TRACKING_URI: {{ .Values.observability.mlflowUri | default "" | quote }}
{{- if eq .Values.mode "openshift" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-oauth-config
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ include "openclaw.oauthClientSecret" . | quote }}
  cookie_secret: {{ include "openclaw.oauthCookieSecret" . | quote }}
{{- end }}
{{- if .Values.telegram.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  bot-token: {{ .Values.telegram.botToken | quote }}
{{- end }}
