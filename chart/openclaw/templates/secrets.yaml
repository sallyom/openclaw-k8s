apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENCLAW_GATEWAY_TOKEN: {{ include "openclaw.gatewayToken" . | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.vertex.project | default "" | quote }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.vertex.location | default "" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  MLFLOW_TRACKING_URI: {{ .Values.observability.mlflowUri | default "" | quote }}
{{- if eq .Values.mode "openshift" }}
{{- $clientSecret := include "openclaw.oauthClientSecret" . }}
{{- $cookieSecret := include "openclaw.oauthCookieSecret" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-oauth-config
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ $clientSecret | quote }}
  cookie_secret: {{ $cookieSecret | quote }}
---
apiVersion: oauth.openshift.io/v1
kind: OAuthClient
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
secret: {{ $clientSecret | quote }}
redirectURIs:
  - https://openclaw-{{ .Release.Namespace }}.{{ .Values.clusterDomain }}/oauth/callback
grantMethod: auto
{{- end }}
{{- if .Values.telegram.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  bot-token: {{ .Values.telegram.botToken | quote }}
{{- end }}
