{{- if eq .Values.mode "openshift" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-oauth-proxy
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-oauth-proxy-tokenreview-{{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openclaw-oauth-proxy
    namespace: {{ .Release.Namespace }}
{{- end }}
